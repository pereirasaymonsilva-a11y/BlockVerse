<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>BlockVerse</title>
<style>
  html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#87c7ff; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  canvas { width:100%; height:100%; display:block; background:linear-gradient(#8fd3ff, #d9f4ff 52%, #9dd98f 52%, #76b86b 100%); }
  .hud { position:fixed; inset:0; pointer-events:none; color:#fff; text-shadow:0 2px 3px rgba(0,0,0,.35); }
  .title { position:absolute; top:12px; left:12px; font-size:18px; font-weight:800; background:rgba(0,0,0,.2); padding:8px 10px; border-radius:14px; }
  .help { position:absolute; top:58px; left:12px; right:12px; font-size:12px; opacity:.95; background:rgba(0,0,0,.18); padding:8px 10px; border-radius:14px; }
  .panel { position:absolute; left:12px; bottom:12px; display:flex; gap:10px; pointer-events:auto; }
  .btn { width:64px; height:64px; border:none; border-radius:18px; background:rgba(255,255,255,.22); color:#fff; font-size:20px; font-weight:700; backdrop-filter: blur(4px); box-shadow:0 8px 18px rgba(0,0,0,.14); }
  .btn:active { transform:scale(.96); background:rgba(255,255,255,.32); }
  .panel-right { position:absolute; right:12px; bottom:12px; display:flex; gap:10px; pointer-events:auto; }
  .crosshair { position:absolute; left:50%; top:50%; width:14px; height:14px; margin-left:-7px; margin-top:-7px; }
  .crosshair:before, .crosshair:after { content:""; position:absolute; background:rgba(255,255,255,.9); box-shadow:0 1px 2px rgba(0,0,0,.4); }
  .crosshair:before { left:6px; top:0; width:2px; height:14px; }
  .crosshair:after { left:0; top:6px; width:14px; height:2px; }
  .corner { position:absolute; top:12px; right:12px; background:rgba(0,0,0,.2); padding:8px 10px; border-radius:14px; font-size:12px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
  <div class="title">BlockVerse v0.1</div>
  <div class="help">Toque em mover. Gire arrastando a tela. Use os botões para pular, colocar e quebrar blocos.</div>
  <div class="corner" id="info">Carregando...</div>
  <div class="crosshair"></div>
  <div class="panel">
    <button class="btn" id="left">◀</button>
    <button class="btn" id="right">▶</button>
    <button class="btn" id="jump">⤒</button>
  </div>
  <div class="panel-right">
    <button class="btn" id="break">✖</button>
    <button class="btn" id="place">＋</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  W = canvas.width = Math.floor(innerWidth * DPR);
  H = canvas.height = Math.floor(innerHeight * DPR);
}
addEventListener('resize', resize); resize();

const world = new Map();
const key = (x,y,z)=>`${x},${y},${z}`;
const size = 18;
for (let x=-size; x<=size; x++) {
  for (let z=-size; z<=size; z++) {
    const h = 1 + Math.floor(1 + 2*Math.sin(x*0.35) + 2*Math.cos(z*0.28));
    for (let y=0; y<h; y++) world.set(key(x,y,z), y === h-1 ? (y < 2 ? 2 : 1) : 3);
  }
}
world.set(key(0,3,0), 4);

const blocks = [
  ['#7bd46a','#4fa94c','#387a35'], // grass
  ['#c79f69','#a67a47','#8b6238'], // dirt
  ['#7c7c7c','#5e5e5e','#444'],     // stone
  ['#d6d16f','#b1ac4b','#8d882e'],  // sand-ish
  ['#ff8b8b','#d84d4d','#a93333'],  // marker
];

const player = {
  x: 0, y: 6, z: -6,
  vx: 0, vy: 0, vz: 0,
  yaw: 0.75, pitch: -0.25,
  onGround: false
};

const input = { forward:0, side:0, jump:false, break:false, place:false };
let dragging = false, lastX = 0, lastY = 0;
canvas.addEventListener('pointerdown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  player.yaw += dx * 0.006;
  player.pitch = Math.max(-1.1, Math.min(1.1, player.pitch + dy * 0.004));
});
addEventListener('pointerup', ()=> dragging=false);

function bindHold(id, on, off) {
  const el = document.getElementById(id);
  el.addEventListener('pointerdown', e => { e.preventDefault(); on(); });
  el.addEventListener('pointerup', e => { e.preventDefault(); off(); });
  el.addEventListener('pointercancel', off);
  el.addEventListener('pointerleave', off);
}
bindHold('left', ()=>input.side=-1, ()=>{ if(input.side===-1) input.side=0; });
bindHold('right', ()=>input.side=1, ()=>{ if(input.side===1) input.side=0; });
document.getElementById('jump').onclick = ()=> input.jump = true;
document.getElementById('break').onclick = ()=> input.break = true;
document.getElementById('place').onclick = ()=> input.place = true;

addEventListener('keydown', e => {
  if (e.key === 'w') input.forward = 1;
  if (e.key === 's') input.forward = -1;
  if (e.key === 'a') input.side = -1;
  if (e.key === 'd') input.side = 1;
  if (e.key === ' ' || e.key === 'Spacebar') input.jump = true;
});
addEventListener('keyup', e => {
  if (['w','s'].includes(e.key)) input.forward = 0;
  if (['a','d'].includes(e.key)) input.side = 0;
});

function getBlock(x,y,z) {
  return world.get(key(x,y,z)) || 0;
}
function setBlock(x,y,z,v) {
  const k = key(x,y,z);
  if (v) world.set(k,v); else world.delete(k);
}
function aabbCollides(x,y,z) {
  const px = Math.floor(x), py = Math.floor(y), pz = Math.floor(z);
  for (let ix=-0.3; ix<=0.3; ix+=0.6) {
    for (let iy=0; iy<=1.8; iy+=0.9) {
      for (let iz=-0.3; iz<=0.3; iz+=0.6) {
        if (getBlock(Math.floor(x+ix), Math.floor(y+iy), Math.floor(z+iz))) return true;
      }
    }
  }
  return false;
}

function shade(hex, p) {
  const n = parseInt(hex.slice(1),16);
  let r = (n>>16)&255, g = (n>>8)&255, b = n&255;
  r = Math.max(0, Math.min(255, r + p));
  g = Math.max(0, Math.min(255, g + p));
  b = Math.max(0, Math.min(255, b + p));
  return `rgb(${r},${g},${b})`;
}

function isoProject(x,y,z) {
  const scale = Math.min(W,H) * 0.045;
  const cx = W * 0.5, cy = H * 0.56;
  const sx = (x - z) * scale;
  const sy = (x + z) * scale * 0.5 - y * scale;
  return [cx + sx, cy + sy];
}

function drawCube(x,y,z, type) {
  const c = blocks[type-1] || blocks[0];
  const [top, left, right] = c;
  const p = [
    isoProject(x, y+1, z),
    isoProject(x+1, y+1, z),
    isoProject(x+1, y+1, z+1),
    isoProject(x, y+1, z+1),
    isoProject(x, y, z),
    isoProject(x+1, y, z),
    isoProject(x+1, y, z+1),
    isoProject(x, y, z+1),
  ];
  // top
  ctx.beginPath();
  ctx.moveTo(...p[0]); ctx.lineTo(...p[1]); ctx.lineTo(...p[2]); ctx.lineTo(...p[3]); ctx.closePath();
  ctx.fillStyle = top; ctx.fill();
  // left
  ctx.beginPath();
  ctx.moveTo(...p[0]); ctx.lineTo(...p[3]); ctx.lineTo(...p[7]); ctx.lineTo(...p[4]); ctx.closePath();
  ctx.fillStyle = left; ctx.fill();
  // right
  ctx.beginPath();
  ctx.moveTo(...p[1]); ctx.lineTo(...p[2]); ctx.lineTo(...p[6]); ctx.lineTo(...p[5]); ctx.closePath();
  ctx.fillStyle = right; ctx.fill();
}

function render() {
  ctx.clearRect(0,0,W,H);
  // sky vignette
  const grd = ctx.createRadialGradient(W*0.5, H*0.35, 20, W*0.5, H*0.4, Math.max(W,H)*0.8);
  grd.addColorStop(0, 'rgba(255,255,255,0.1)');
  grd.addColorStop(1, 'rgba(0,0,0,0.08)');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  const arr = [];
  const camX = player.x, camY = player.y, camZ = player.z;
  const radius = 20;
  for (let [k,v] of world.entries()) {
    const [x,y,z] = k.split(',').map(Number);
    const dx = x - camX, dy = y - camY, dz = z - camZ;
    if (dx*dx + dy*dy + dz*dz < radius*radius) arr.push([x,y,z,v, dx+dy*0.2+dz]);
  }
  arr.sort((a,b)=> (a[0]+a[1]+a[2]) - (b[0]+b[1]+b[2]));
  for (const [x,y,z,v] of arr) drawCube(x,y,z,v);
}

let last = performance.now();
let selected = 1;

function step(dt) {
  const speed = 5.2;
  const sx = Math.sin(player.yaw), cz = Math.cos(player.yaw);
  const fx = Math.cos(player.yaw), fz = Math.sin(player.yaw);

  const mx = (input.side * fx + input.forward * sx);
  const mz = (input.side * fz - input.forward * fx);

  player.vx += mx * speed * dt * 2.5;
  player.vz += mz * speed * dt * 2.5;
  player.vy -= 14 * dt;

  let nx = player.x + player.vx * dt;
  let ny = player.y + player.vy * dt;
  let nz = player.z + player.vz * dt;

  if (!aabbCollides(nx, player.y, player.z)) player.x = nx; else player.vx = 0;
  if (!aabbCollides(player.x, ny, player.z)) {
    player.y = ny;
    player.onGround = false;
  } else {
    if (player.vy < 0) player.onGround = true;
    player.vy = 0;
  }
  if (!aabbCollides(player.x, player.y, nz)) player.z = nz; else player.vz = 0;

  player.vx *= Math.pow(0.001, dt);
  player.vz *= Math.pow(0.001, dt);

  if (input.jump && player.onGround) {
    player.vy = 6.6;
    player.onGround = false;
  }
  input.jump = false;

  // Simple "focus" block in front
  const tx = Math.floor(player.x + fx*2);
  const ty = Math.floor(player.y + 0.5);
  const tz = Math.floor(player.z + fz*2);

  if (input.break) {
    setBlock(tx, ty, tz, 0);
    input.break = false;
  }
  if (input.place) {
    setBlock(tx, ty, tz, selected);
    input.place = false;
  }

  // Keep player above ground
  if (player.y < -10) { player.x = 0; player.y = 8; player.z = -6; player.vx=player.vy=player.vz=0; }

  info.textContent = `X ${player.x.toFixed(1)}  Y ${player.y.toFixed(1)}  Z ${player.z.toFixed(1)}  |  Blocos: ${world.size}`;
}

function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000);
  last = now;
  step(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
